<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocky Reborn - Maintenance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 50px 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .logo {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.9;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .status {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      background: #f59e0b;
      color: #111827;
      font-weight: bold;
      margin-top: 10px;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.95rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Rocky Reborn</div>
    <h1>Under Maintenance</h1>
    <p>
      We're currently working on improvements, updates, and fixes to make Rocky even better.
      Some features may be temporarily unavailable while maintenance is in progress.
    </p>

    <div class="status">Maintenance Mode Active</div>

    <div class="footer">
      Thank you for your patience. We'll be back soon.
    </div>
  </div>
</body>
</html>
