<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky Reborn | Settings</title>

<link rel="icon" href="images/rocky-favicon.png">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow-x: hidden;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }

  header {
    background: rgba(0,0,0,0.8);
    padding: 10px;
  }

  .box {
    background: #111;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
  }

  button {
    background: #0284d4;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 5px;
  }

  button:hover {
    background: #026bb2;
  }

  input, select {
    padding: 8px;
    margin: 5px;
    width: 80%;
  }
</style>
</head>

<body>

<header>
  <h1>⚙️ Rocky Settings</h1>
</header>

<!-- TAB CLOAKER -->
<div class="box">
  <h2>Tab Cloaker</h2>
  <select id="cloakSelect">
    <option value="Rocky Reborn">Default</option>
    <option value="Google">Google</option>
    <option value="Google Classroom">Google Classroom</option>
    <option value="YouTube">YouTube</option>
  </select>
  <br>
  <button onclick="applyCloak()">Apply</button>
</div>

<!-- CUSTOM CLOAKER -->
<div class="box">
  <h2>Custom Cloaker</h2>
  <input id="titleInput" placeholder="Custom Title">
  <input id="iconInput" placeholder="Favicon URL">
  <br>
  <button onclick="setCustomCloak()">Set Cloak</button>
</div>

<!-- PARTICLES -->
<div class="box">
  <h2>Particles</h2>
  <button onclick="enableParticles()">Enable</button>
  <button onclick="disableParticles()">Disable</button>
</div>

<!-- ABOUT:BLANK CLOAKER -->
<div class="box">
  <h2>about:blank Cloaker</h2>
  <p>Opens Rocky in a hidden tab</p>
  <button onclick="openCloaked()">Launch Cloak</button>
</div>

<!-- DEBUG -->
<div class="box">
  <h2>Debug Mode</h2>
  <button onclick="enterDebug()">Enter Debug</button>
</div>

<canvas id="particles"></canvas>

<script>
/* TAB CLOAK */
function applyCloak() {
  const value = document.getElementById("cloakSelect").value;
  document.title = value;
}

/* CUSTOM CLOAK */
function setCustomCloak() {
  const title = document.getElementById("titleInput").value;
  const icon = document.getElementById("iconInput").value;

  if (title) document.title = title;

  if (icon) {
    let link = document.querySelector("link[rel='icon']");
    if (!link) {
      link = document.createElement("link");
      link.rel = "icon";
      document.head.appendChild(link);
    }
    link.href = icon;
  }
}

/* PARTICLES SYSTEM */
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");
let particles = [];
let animationRunning = false;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function createParticles() {
  particles = [];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 3,
      speedX: Math.random() * 2 - 1,
      speedY: Math.random() * 2 - 1
    });
  }
}

function animateParticles() {
  if (!animationRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}

function enableParticles() {
  animationRunning = true;
  createParticles();
  animateParticles();
}

function disableParticles() {
  animationRunning = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* ABOUT:BLANK CLOAKER */
function openCloaked() {
  let win = window.open();
  let iframe = win.document.createElement("iframe");

  iframe.style.border = "none";
  iframe.style.width = "100%";
  iframe.style.height = "100%";
  iframe.src = window.location.href;

  win.document.body.style.margin = "0";
  win.document.body.appendChild(iframe);

  window.location.href = "https://www.google.com";
}

/* DEBUG */
function enterDebug() {
  alert("Debug Mode Enabled 😈");
  console.log("Rocky Debug Mode Active");
}
</script>

</body>
</html>
